<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bugzy Network Capture QA Playground</title>
<style>
body{font-family:Arial,sans-serif;margin:40px;background:#f5f5f5}
button{margin:6px;padding:10px 16px;cursor:pointer}
pre{background:#222;color:#0f0;padding:10px;min-height:120px;white-space:pre-wrap}
</style>
</head>
<body>
<h2>Bugzy Network Capture QA Playground</h2>


<button onclick="getReq()">GET Request</button>
<button onclick="postJson()">POST JSON (fetch)</button>
<button onclick="postForm()">POST FormData (XHR)</button>
<button onclick="postUrlEncoded()">POST URLSearchParams</button>
<button onclick="redirectReq()">302 Redirect</button>
<button onclick="binaryReq()">Binary Response</button>
<button onclick="timeoutReq()">Timeout</button>
<button onclick="abortReq()">Canceled</button>
<button onclick="sendBeaconReq()">sendBeacon</button>

<pre id="log">Ready...</pre>

<script>
const log=(m)=>document.getElementById("log").textContent=m;

async function getReq(){
 let r=await fetch("https://httpbin.org/get?token=123456&user=lotfy");
 log(await r.text());
}

async function postJson(){
 let r=await fetch("https://httpbin.org/post",{
 method:"POST",
 headers:{
   "Content-Type":"application/json",
   "Authorization":"Bearer SECRET_TOKEN",
   "x-api-key":"ABC123SECRET"
 },
 body:JSON.stringify({
   name:"Lotfy",
   password:"123456",
   api_key:"XYZ987",
   age:28
 })
 });
 log(await r.text());
}

function postForm(){
 const fd=new FormData();
 fd.append("name","Lotfy");
 fd.append("email","lotfy@test.com");
 fd.append("password","123456");
 const xhr=new XMLHttpRequest();
 xhr.open("POST","https://httpbin.org/post");
 xhr.onload=()=>log(xhr.responseText);
 xhr.send(fd);
}

function postUrlEncoded(){
 const p=new URLSearchParams();
 p.append("username","lotfy");
 p.append("secret","abcdef");
 fetch("https://httpbin.org/post",{
 method:"POST",
 body:p
 }).then(r=>r.text()).then(log);
}

function redirectReq(){
 fetch("https://httpbin.org/redirect-to?url=https://httpbin.org/get");
}

function binaryReq(){
 fetch("https://httpbin.org/image/png")
 .then(r=>r.blob())
 .then(b=>log("Binary size: "+b.size+" bytes"));
}

function timeoutReq(){
 const xhr=new XMLHttpRequest();
 xhr.open("GET","https://httpbin.org/delay/10");
 xhr.timeout=2000;
 xhr.ontimeout=()=>log("Timeout fired");
 xhr.send();
}

function abortReq(){
 const xhr=new XMLHttpRequest();
 xhr.open("GET","https://httpbin.org/delay/10");
 xhr.onload=()=>log(xhr.responseText);
 xhr.send();
 setTimeout(()=>{xhr.abort();log("Request canceled");},1000);
}

function sendBeaconReq(){
 const ok=navigator.sendBeacon(
   "https://httpbin.org/post",
   JSON.stringify({event:"qa-test",token:"secret123"})
 );
 log("sendBeacon result: "+ok);
}
</script>


</body>
</html>
